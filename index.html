<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#E8547A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ludmila">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Ludmila</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   TOKENS
══════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --p1:#E8547A;--p2:#F2789A;--p3:#F9ADBF;--p4:#FCDDE7;--p5:#FEF3F6;
  --deep:#BF3A5E;--ink:#3D1020;--sub:#A0607A;--ghost:#C9A0B0;
  --g:rgba(255,255,255,0.70);--g2:rgba(255,255,255,0.92);
  --sh:0 6px 32px rgba(191,58,94,.11);--sh2:0 18px 56px rgba(191,58,94,.18);
  --r:22px;--nav-w:220px;
}
html,body{height:100%;background:#FDF0F5}
body{font-family:'Jost',sans-serif;color:var(--ink);overflow-x:hidden}

/* ══════════════════════════════════════════
   BACKGROUND
══════════════════════════════════════════ */
body::before{
  content:'';position:fixed;inset:0;z-index:-2;
  background:
    radial-gradient(ellipse 70% 60% at 10% 5%,#FFD6E866,transparent 65%),
    radial-gradient(ellipse 50% 65% at 92% 12%,#FFBDCC55,transparent 58%),
    radial-gradient(ellipse 60% 45% at 50% 98%,#F9ADBF2A,transparent 60%),
    linear-gradient(155deg,#FFF8FA 0%,#FCE8F2 45%,#F8D4E2 100%);
}
body::after{
  content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.04;
  background-image:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='20' r='1' fill='%23E8547A'/%3E%3C/svg%3E");
  background-size:40px 40px;
}

/* ══════════════════════════════════════════
   LAYOUT — MOBILE
══════════════════════════════════════════ */
.shell{display:flex;flex-direction:column;min-height:100vh;max-width:430px;margin:0 auto}
.hdr{
  position:sticky;top:0;z-index:90;height:62px;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(180deg,rgba(252,219,229,.96),rgba(254,240,244,.88));
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-bottom:1px solid rgba(255,255,255,.55);
  box-shadow:0 2px 20px rgba(191,58,94,.08);
}
.logo{display:flex;flex-direction:column;align-items:center;gap:1px}
.logo-name{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:27px;color:var(--deep);letter-spacing:2px;line-height:1;text-shadow:0 1px 10px rgba(191,58,94,.16)}
.logo-dots{display:flex;gap:4px;margin-top:2px}
.logo-dot{width:3px;height:3px;border-radius:50%;background:var(--p3)}
.cnt{flex:1;padding:18px 16px 90px;overflow-y:auto}
.nav-mob{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;z-index:90;
  background:rgba(255,248,251,.95);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-top:1px solid rgba(255,205,220,.4);
  padding:9px 0 16px;display:flex;
  box-shadow:0 -4px 28px rgba(191,58,94,.08);
}
.nav-desk{display:none}
.nb{flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--ghost);padding:2px 0;transition:all .28s cubic-bezier(.34,1.56,.64,1);font-family:'Jost',sans-serif;font-weight:500;font-size:8.5px;letter-spacing:1px;text-transform:uppercase;position:relative}
.nb.on{color:var(--p1)}
.nb.on::after{content:'';position:absolute;top:-9px;left:50%;transform:translateX(-50%);width:28px;height:2px;border-radius:2px;background:linear-gradient(90deg,var(--p1),var(--p2))}
.nb svg{transition:transform .28s cubic-bezier(.34,1.56,.64,1)}
.nb.on svg{transform:translateY(-2px) scale(1.08)}

/* ══════════════════════════════════════════
   LAYOUT — DESKTOP  (≥900px)
══════════════════════════════════════════ */
@media(min-width:900px){
  .shell{max-width:100%;flex-direction:row;height:100vh}
  .hdr{display:none}
  .cnt{padding:28px 36px 28px;flex:1;overflow-y:auto;max-height:100vh}
  .nav-mob{display:none}
  .nav-desk{
    display:flex;flex-direction:column;
    width:var(--nav-w);min-width:var(--nav-w);
    background:rgba(255,245,249,.96);
    backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
    border-right:1px solid rgba(255,205,220,.35);
    padding:32px 0 24px;
    box-shadow:4px 0 32px rgba(191,58,94,.07);
    overflow-y:auto;
  }
  .desk-logo{padding:0 24px 32px;border-bottom:1px solid rgba(255,205,220,.25);margin-bottom:16px}
  .desk-logo-name{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:32px;color:var(--deep);letter-spacing:2px;line-height:1;text-shadow:0 1px 12px rgba(191,58,94,.14)}
  .desk-logo-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;color:var(--sub);letter-spacing:1px;margin-top:3px}
  .desk-logo-dots{display:flex;gap:4px;margin-top:6px}
  .desk-logo-dot{width:4px;height:4px;border-radius:50%;background:var(--p3)}
  .nb{flex:none;flex-direction:row;justify-content:flex-start;gap:12px;padding:12px 24px;border-radius:0 18px 18px 0;margin:2px 16px 2px 0;font-size:12px;letter-spacing:.5px;color:var(--sub)}
  .nb.on{background:linear-gradient(135deg,rgba(232,84,122,.1),rgba(242,120,154,.06));color:var(--p1)}
  .nb.on::after{top:50%;left:0;transform:translateY(-50%);width:3px;height:26px;border-radius:0 3px 3px 0}
  .nb svg{transform:none!important}
  .nb.on svg{transform:scale(1.08)!important}
  .desk-install{margin-top:auto;padding:16px 20px 0;border-top:1px solid rgba(255,205,220,.25)}
  .desk-install-btn{width:100%;background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;border:none;border-radius:14px;padding:11px;font-family:'Jost',sans-serif;font-weight:500;font-size:12px;letter-spacing:.5px;cursor:pointer;box-shadow:0 4px 16px rgba(232,84,122,.28);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
  .desk-install-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(232,84,122,.38)}
}

/* ══════════════════════════════════════════
   COMPONENTS
══════════════════════════════════════════ */
.fade{animation:fu .35s cubic-bezier(.22,.68,0,1.15) both}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.sec-lbl{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:13px;color:var(--sub);letter-spacing:.5px;margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.sec-lbl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(232,84,122,.15),transparent)}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.top-row .sec-lbl{margin:0}

.card{background:var(--g);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:var(--r);padding:16px;margin-bottom:10px;border:1px solid rgba(255,255,255,.78);box-shadow:var(--sh);transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.ct{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--ink)}
.cs{font-size:11px;color:var(--sub);margin-top:2px;letter-spacing:.2px}
.tag{display:inline-block;font-size:9.5px;font-weight:500;letter-spacing:.8px;padding:2px 9px;border-radius:20px;margin:3px 2px 0 0;background:rgba(232,84,122,.1);color:var(--p1);border:1px solid rgba(232,84,122,.2)}

.btn{background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;border:none;border-radius:50px;padding:10px 22px;font-family:'Jost',sans-serif;font-weight:500;font-size:12px;letter-spacing:.5px;cursor:pointer;box-shadow:0 4px 18px rgba(232,84,122,.3);transition:all .2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(232,84,122,.42)}
.btn:active{transform:scale(.97)}
.btn-s{background:rgba(232,84,122,.09);color:var(--deep);border:1px solid rgba(232,84,122,.18);border-radius:50px;padding:6px 15px;font-family:'Jost',sans-serif;font-weight:500;font-size:11px;letter-spacing:.3px;cursor:pointer;transition:all .18s}
.btn-s:hover{background:rgba(232,84,122,.17)}
.btn-ic{background:none;border:none;font-size:14px;cursor:pointer;opacity:.5;transition:all .18s;padding:4px;line-height:1;display:flex;align-items:center;justify-content:center}
.btn-ic:hover{opacity:1;transform:scale(1.2)}

.inp{background:rgba(255,255,255,.88);border:1.5px solid rgba(232,84,122,.18);border-radius:14px;padding:10px 14px;color:var(--ink);font-size:13px;width:100%;font-family:'Jost',sans-serif;outline:none;transition:border .2s,box-shadow .2s}
.inp:focus{border-color:var(--p1);box-shadow:0 0 0 3px rgba(232,84,122,.1)}
.inp::placeholder{color:var(--ghost)}
textarea.inp{resize:vertical;min-height:58px}

.pg-track{flex:1;height:5px;background:rgba(232,84,122,.12);border-radius:20px;overflow:hidden}
.pg-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--p1),var(--p3));transition:width .7s cubic-bezier(.34,1.2,.64,1)}
.div{height:1px;background:linear-gradient(90deg,transparent,rgba(232,84,122,.18),transparent);margin:16px 0}

/* ══════════════════════════════════════════
   MODAL
══════════════════════════════════════════ */
.ov{position:fixed;inset:0;z-index:200;background:rgba(61,16,32,.22);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:flex;align-items:flex-end;justify-content:center}
@media(min-width:900px){.ov{align-items:center}}
.modal{background:rgba(255,248,251,.98);border-radius:32px 32px 0 0;padding:22px 22px 40px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;border-top:1px solid rgba(255,255,255,.95);box-shadow:0 -20px 70px rgba(191,58,94,.2);animation:mUp .3s cubic-bezier(.34,1.1,.64,1)}
@media(min-width:900px){.modal{border-radius:28px;animation:mFade .25s ease}}
@keyframes mUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes mFade{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.m-handle{width:36px;height:3px;background:var(--p4);border-radius:10px;margin:0 auto 20px}
@media(min-width:900px){.m-handle{display:none}}
.m-title{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:600;color:var(--ink);margin-bottom:20px}
.f-grid{display:flex;flex-direction:column;gap:13px}
.f-lbl{font-size:9.5px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
.m-actions{display:flex;gap:10px;margin-top:22px}
.m-cancel{flex:1;background:rgba(232,84,122,.09);color:var(--sub);border:none;border-radius:14px;padding:12px;font-weight:500;cursor:pointer;font-family:'Jost',sans-serif;transition:all .18s}
.m-save{flex:2;background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;border:none;border-radius:14px;padding:12px;font-weight:600;cursor:pointer;font-family:'Jost',sans-serif;box-shadow:0 4px 16px rgba(232,84,122,.3)}

/* ══════════════════════════════════════════
   INSTALL BANNER (mobile)
══════════════════════════════════════════ */
.install-banner{
  display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:var(--g2);backdrop-filter:blur(16px);border-radius:18px;
  padding:12px 18px;box-shadow:var(--sh2);
  border:1px solid rgba(255,255,255,.8);z-index:85;
  flex-direction:row;align-items:center;gap:12px;max-width:380px;width:calc(100% - 32px);
  animation:fu .4s ease;
}
.install-banner.show{display:flex}
@media(min-width:900px){.install-banner{display:none!important}}
.ib-text{flex:1}
.ib-title{font-size:13px;font-weight:600;color:var(--ink)}
.ib-sub{font-size:11px;color:var(--sub);margin-top:1px}
.ib-btn{background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;border:none;border-radius:12px;padding:8px 14px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Jost',sans-serif;white-space:nowrap;box-shadow:0 3px 12px rgba(232,84,122,.3)}
.ib-close{background:none;border:none;color:var(--ghost);cursor:pointer;font-size:16px;padding:2px;line-height:1}

/* ══════════════════════════════════════════
   POMODORO
══════════════════════════════════════════ */
.pomo{background:linear-gradient(145deg,rgba(255,240,246,.92),rgba(252,219,229,.72));backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:28px;padding:26px 18px 22px;margin-bottom:16px;border:1px solid rgba(255,255,255,.82);box-shadow:var(--sh2);text-align:center;position:relative;overflow:hidden}
.pomo::before{content:'';position:absolute;top:-50px;right:-50px;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,rgba(232,84,122,.07),transparent 70%);pointer-events:none}
.pomo-hdr{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:14px;color:var(--sub);margin-bottom:16px;letter-spacing:.5px}
.pills{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-bottom:18px}
.pill{background:rgba(255,255,255,.65);color:var(--sub);border:1px solid rgba(232,84,122,.15);border-radius:50px;padding:5px 14px;font-size:10px;font-weight:500;letter-spacing:.3px;cursor:pointer;font-family:'Jost',sans-serif;transition:all .22s}
.pill:hover{background:rgba(232,84,122,.08)}
.pill.on{background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;border-color:transparent;box-shadow:0 4px 16px rgba(232,84,122,.3)}
.pill-c{background:rgba(255,255,255,.55);color:var(--p1);border:1px dashed rgba(232,84,122,.3);border-radius:50px;padding:5px 14px;font-size:10px;font-weight:500;cursor:pointer;font-family:'Jost',sans-serif;transition:all .22s}
.pill-c.on{background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;border-color:transparent}
.cp{background:rgba(255,255,255,.8);border-radius:18px;padding:16px;margin-bottom:16px;border:1px solid rgba(232,84,122,.15);animation:fu .22s ease}
.cp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.cp-f{display:flex;flex-direction:column;gap:5px}
.cp-l{font-size:9px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:1.5px;text-align:center}
.cp-wrap{display:flex;align-items:center;background:var(--p5);border:1.5px solid rgba(232,84,122,.15);border-radius:12px;overflow:hidden}
.cp-btn{background:none;border:none;padding:0 11px;height:40px;font-size:16px;cursor:pointer;color:var(--p1);transition:background .15s;font-weight:600}
.cp-btn:hover{background:rgba(232,84,122,.08)}
.cp-num{width:100%;background:none;border:none;text-align:center;font-size:15px;font-weight:600;color:var(--ink);font-family:'Cormorant Garamond',serif;outline:none;padding:8px 0}
.ring-wrap{position:relative;width:185px;height:185px;margin:0 auto 6px}
.ring-wrap svg{transform:rotate(-90deg);filter:drop-shadow(0 6px 18px rgba(232,84,122,.17))}
.ring-in{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.ring-t{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:48px;color:var(--ink);letter-spacing:-3px;line-height:1}
.ring-m{font-size:9px;font-weight:600;color:var(--sub);letter-spacing:2px;text-transform:uppercase}
.pomo-btns{display:flex;gap:10px;justify-content:center;margin-top:18px}
.pomo-sess{font-size:10px;color:var(--ghost);margin-top:10px;letter-spacing:.5px}

/* PLAYLISTS */
.pl-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.pl-row::-webkit-scrollbar{display:none}
.plc{background:linear-gradient(145deg,rgba(255,255,255,.9),rgba(252,219,229,.55));backdrop-filter:blur(10px);border-radius:22px;padding:16px 13px;min-width:112px;text-align:center;flex-shrink:0;border:1px solid rgba(255,255,255,.88);box-shadow:0 4px 18px rgba(232,84,122,.1);cursor:pointer;transition:all .22s}
.plc:hover{transform:translateY(-5px);box-shadow:0 12px 32px rgba(232,84,122,.2)}
.pl-em{margin-bottom:8px;display:flex;justify-content:center}
.pl-nm{font-size:10px;font-weight:500;color:var(--ink);line-height:1.4;letter-spacing:.2px}
.pl-acts{display:flex;gap:4px;justify-content:center;margin-top:8px}
.pl-act{background:rgba(232,84,122,.09);color:var(--p1);border:none;border-radius:8px;padding:3px 8px;font-size:10px;cursor:pointer;font-weight:500;font-family:'Jost',sans-serif;transition:all .15s}
.pl-act:hover{background:rgba(232,84,122,.18)}

/* MUSIC */
.mu-disc{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--p4),var(--p3));display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 14px rgba(232,84,122,.18)}

/* STUDY */
.sprg{display:flex;align-items:center;gap:9px;margin-top:9px}
.sbtns{display:flex;gap:5px;margin-top:9px}
.stb{background:rgba(232,84,122,.07);color:var(--deep);border:1px solid rgba(232,84,122,.12);border-radius:50px;padding:4px 12px;font-size:10px;font-weight:500;cursor:pointer;font-family:'Jost',sans-serif;transition:all .15s;letter-spacing:.3px}
.stb:hover{background:rgba(232,84,122,.16)}
.stb.done{background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(232,84,122,.24)}

/* WISHLIST */
.wcard{background:var(--g);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-radius:20px;padding:14px 16px;margin-bottom:8px;border:1px solid rgba(255,255,255,.72);box-shadow:0 4px 16px rgba(232,84,122,.07);display:flex;align-items:center;gap:12px;transition:transform .18s}
.wcard:hover{transform:translateY(-2px)}
.wchk{width:22px;height:22px;border-radius:8px;flex-shrink:0;border:1.5px solid rgba(232,84,122,.28);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .22s}
.wchk.on{background:linear-gradient(135deg,var(--p1),var(--p2));border-color:transparent;box-shadow:0 3px 10px rgba(232,84,122,.3)}

/* STREAMS */
.ldot{width:6px;height:6px;border-radius:50%;background:var(--p1);display:inline-block;animation:pu 1.5s infinite;flex-shrink:0}
@keyframes pu{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(1.6)}}

/* KIRA */
.kscene{background:linear-gradient(165deg,rgba(255,228,238,.88),rgba(249,173,191,.55));border-radius:26px;padding:16px;margin-bottom:12px;position:relative;overflow:hidden;min-height:178px;border:1px solid rgba(255,255,255,.78);box-shadow:var(--sh)}
.kscene::before{content:'';position:absolute;bottom:0;left:0;right:0;height:30px;background:linear-gradient(180deg,transparent,rgba(232,84,122,.07));pointer-events:none}
.ksp{position:absolute;bottom:12px;left:20%;transition:left .07s linear,transform .14s;cursor:pointer}
.kmsg{background:rgba(255,255,255,.84);border-radius:16px;padding:10px 16px;margin-bottom:11px;font-style:italic;font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--ink);text-align:center;border:1px solid rgba(255,255,255,.78);min-height:40px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(232,84,122,.06);transition:all .3s}
.kstats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.kstat{background:rgba(255,255,255,.72);backdrop-filter:blur(8px);border-radius:18px;padding:12px 10px;text-align:center;border:1px solid rgba(255,255,255,.72);box-shadow:0 3px 12px rgba(232,84,122,.07)}
.ksl{font-size:8.5px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:1.2px}
.ksv{font-size:13px;font-weight:600;color:var(--deep);margin-top:4px}
.kacts{display:flex;gap:7px;margin-top:10px}

var deferredPrompt=null;

function installPWA(){

}
document.addEventListener('DOMContentLoaded',function(){
  var ib=document.getElementById('ib-install');if(ib)ib.onclick=installPWA;

// POMODORO
// ════════════════════════════════════════════════
var PM=[{l:'25 min',w:25,b:5},{l:'15 min',w:15,b:3},{l:'50 min',w:50,b:10}];
function pW(){return S.pomo.mi===3?S.pomo.cw:PM[S.pomo.mi].w;}
function pB(){return S.pomo.mi===3?S.pomo.cb:PM[S.pomo.mi].b;}
function pStart(){
  if(S.pit)return;S.pomo.run=true;
  S.pit=setInterval(function(){
    S.pomo.secs--;
    if(S.pomo.secs<=0){
      clearInterval(S.pit);S.pit=null;S.pomo.run=false;
      if(S.pomo.isW){S.pomo.sess++;S.pomo.isW=false;S.pomo.secs=pB()*60;}
      else{S.pomo.isW=true;S.pomo.secs=pW()*60;}
    }
    if(S.sec==='study')uRing();
  },1000);
}
function pPause(){clearInterval(S.pit);S.pit=null;S.pomo.run=false;uRing();}
function pReset(){pPause();S.pomo.isW=true;S.pomo.secs=pW()*60;if(S.sec==='study')uRing();}
function pMode(i){S.pomo.mi=i;S.pomo.showC=(i===3);pReset();if(S.sec==='study')rStudy();}
function applyC(){
  var w=parseInt(document.getElementById('cpw').value)||25;
  var b=parseInt(document.getElementById('cpb').value)||5;
  S.pomo.cw=Math.max(1,Math.min(120,w));S.pomo.cb=Math.max(1,Math.min(60,b));
  pReset();if(S.sec==='study')rStudy();
}
function stepC(id,d){var e=document.getElementById(id);if(!e)return;var v=parseInt(e.value)||0;e.value=Math.max(1,Math.min(id==='cpw'?120:60,v+d));}
function uRing(){
  var p=S.pomo,tot=(p.isW?pW():pB())*60;
  var pr=1-p.secs/tot,R=80,circ=2*Math.PI*R,dash=circ*(1-pr);
  var mn=String(Math.floor(p.secs/60)).padStart(2,'0'),sc=String(p.secs%60).padStart(2,'0');
  var a=document.getElementById('parc');if(a)a.setAttribute('stroke-dashoffset',dash);
  var t=document.getElementById('ptim');if(t)t.textContent=mn+':'+sc;
  var b=document.getElementById('pbtn');if(b)b.textContent=p.run?'⏸  Pausar':'▶  Iniciar';
  var h=document.getElementById('phdr');if(h)h.textContent=p.isW?'— enfocándote —':'— descansando —';
  var s=document.getElementById('pses');if(s)s.textContent=p.sess+' sesión'+(p.sess!==1?'es':'')+' completada'+(p.sess!==1?'s':'');
}

function rCal(){
  var y=S.cal.y,m=S.cal.m,ev=S.cal.ev;
  var MN=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  var first=new Date(y,m,1),sd=first.getDay()-1;if(sd<0)sd=6;
  var dim=new Date(y,m+1,0).getDate(),pd=new Date(y,m,0).getDate();

    '<button class="btn-ic" onclick="cN(-1)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></button>'+

    '<button class="btn-ic" onclick="cN(1)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></button>'+

  for(var i=0;i<sd;i++)h+='<div style="font-size:11px;text-align:center;padding:5px 1px;color:var(--ghost)">'+(pd-sd+1+i)+'</div>';
  for(var d=1;d<=dim;d++){

// ════════════════════════════════════════════════
// ACTIONS
// ════════════════════════════════════════════════
function tFav(id){S.music=S.music.map(function(s){return s.id===id?Object.assign({},s,{fav:!s.fav}):s;});rStudy();}
function dMu(id) {S.music=S.music.filter(function(s){return s.id!==id;});rStudy();}
function dPL(id) {S.plists=S.plists.filter(function(s){return s.id!==id;});rStudy();}
function dSt(id) {S.study=S.study.filter(function(s){return s.id!==id;});rStudy();}
function uPr(id,d){S.study=S.study.map(function(s){return s.id!==id?s:Object.assign({},s,{prog:Math.min(100,Math.max(0,d===100?100:s.prog+d))});});rStudy();}
function tWish(id){S.wish=S.wish.map(function(w){return w.id===id?Object.assign({},w,{done:!w.done}):w;});rWishlist();}
function dWish(id){S.wish=S.wish.filter(function(w){return w.id!==id;});rWishlist();}
function tLive(id){S.streams=S.streams.map(function(s){return s.id===id?Object.assign({},s,{live:!s.live}):s;});rStreams();}
function dStr(id) {S.streams=S.streams.filter(function(s){return s.id!==id;});rStreams();}
function dRec(id) {S.recipes=S.recipes.filter(function(r){return r.id!==id;});rRecipes();}

// ════════════════════════════════════════════════
// NAV
// ════════════════════════════════════════════════
function show(sec){
  S.sec=sec;
  if(sec!=='kira')kStop();
  buildNav();
  if(sec==='study')    rStudy();
  else if(sec==='wishlist') rWishlist();
  else if(sec==='streams')  rStreams();
  else if(sec==='recipes')  rRecipes();
  else if(sec==='kira')     rKira();
}

// INIT
buildNav();
show('study');
</script>
